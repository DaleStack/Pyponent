name: Deploy Documentation

on:
  push:
    branches:
      - master  # Change to 'main' if that is your default branch
      
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: pip install mkdocs-material "mkdocs<2.0.0"
      - run: mkdocs gh-deploy --force